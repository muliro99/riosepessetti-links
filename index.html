  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #3A4D6B;
      --deep:    #2B3D55;
      --surface: #425C78;
      --silver:  #C4D4E6;
      --muted:   #8AACC6;
      --white:   #FFFFFF;
      --f-serif: 'Playfair Display', Georgia, serif;
      --f-sans:  'Inter', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    img  { max-width: 100%; display: block; }
    a    { color: inherit; text-decoration: none; }

    body {
      background: var(--bg);
      color: var(--silver);
      font-family: var(--f-sans);
      font-size: 1rem;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.25rem 3.5rem;
    }

    .page {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      width: 150px;
      margin-bottom: 1.35rem;
    }

    .nome {
      font-family: var(--f-serif);
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--white);
      text-align: center;
      line-height: 1.2;
      margin-bottom: 0.4rem;
    }

    .cidade {
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .divider {
      width: 36px;
      height: 1px;
      background: rgba(196, 212, 230, 0.22);
      margin-bottom: 2rem;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 2.25rem;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.85rem 1rem;
      background: var(--surface);
      border: 1px solid rgba(196, 212, 230, 0.1);
      border-radius: 6px;
      transition: background 0.18s ease, transform 0.14s ease;
    }

    .card:hover {
      background: #4d6b87;
      transform: translateY(-1px);
    }

    .card:active {
      transform: translateY(0);
    }

    .icone {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(196, 212, 230, 0.09);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icone svg { width: 21px; height: 21px; }

    .info { flex: 1; min-width: 0; }

    .cargo {
      font-size: 0.73rem;
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.1rem;
    }

    .pessoa {
      font-size: 0.95rem;
      color: var(--white);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .seta { color: var(--muted); flex-shrink: 0; }
    .seta svg { width: 15px; height: 15px; }

    .sociais {
      display: flex;
      gap: 0.85rem;
    }

    .social {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(196, 212, 230, 0.07);
      border: 1px solid rgba(196, 212, 230, 0.14);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s ease;
    }

    .social:hover { background: rgba(196, 212, 230, 0.16); }
    .social svg { width: 18px; height: 18px; }
  </style>
</head>
